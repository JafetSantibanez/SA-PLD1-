<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordenador de Números</title>
    <link rel="stylesheet" href="./numeros.css">
</head>
<body>

    <div class="container">
        <h1>🔢 Ordenador de Números</h1>

        <div class="inputs">
            <input type="number" id="numero1" placeholder="Primer número">
            <input type="number" id="numero2" placeholder="Segundo número">
            <input type="number" id="numero3" placeholder="Tercer número">
        </div>

        <button onclick="analizarNumeros()">
            Analizar números
        </button>

        <div id="resultado" class="resultado"></div>
    </div>

    <script src="./numeros.js"></script>
</body>
</html>
